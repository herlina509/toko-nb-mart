<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NB Mart - Belanja Modern</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --light: #f8fafc;
            --success: #22c55e;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light); color: var(--primary); }
        
        /* Header & Nav */
        header { background: var(--primary); color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 1px; }
        .contact-info { font-size: 0.9rem; }

        /* Showcase / Hero Section */
        .showcase { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1578916171728-46686eac8d58?auto=format&fit=crop&q=80&w=1000');
            background-size: cover; background-position: center; height: 300px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center;
        }

        /* Product Grid */
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        
        .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.3s; border: 1px solid #e2e8f0; }
        .product-card:hover { transform: translateY(-5px); }
